<svg width="230" height="230" viewBox="0 0 230 230" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="ringGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="115.0" cy="115.0" r="92" fill="none" stroke="url(#ringGrad)"
          stroke-width="5" stroke-dasharray="26 14" stroke-linecap="round" filter="url(#ringGlow)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 115.0 115.0" to="360 115.0 115.0" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="115.0" cy="115.0" r="74" fill="#04060d" stroke="#1e293b" stroke-width="2"/>
  <text x="115.0" y="131.0" text-anchor="middle" font-family="JetBrains Mono, monospace"
        font-size="44" font-weight="800" fill="#7DD3FC">P</text>
  <text x="115.0" y="198" text-anchor="middle" font-family="Fira Code, monospace"
        font-size="15" font-weight="700" fill="#E2E8F0">Pixabay_clone_V</text>
  <text x="115.0" y="216" text-anchor="middle" font-family="Fira Code, monospace"
        font-size="11" fill="#64748B">JavaScript / Image Gallery</text>
</svg>